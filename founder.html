<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Dashboard - Foundera</title>
    <link rel="icon" type="image/jpeg" href="images/founderaLogo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/founder.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3TUXLt1wvQG3vtR3IRV7SkUQ30wdFg_c",
            authDomain: "foundera-6b9c3.firebaseapp.com",
            databaseURL: "https://foundera-6b9c3-default-rtdb.firebaseio.com",
            projectId: "foundera-6b9c3",
            storageBucket: "foundera-6b9c3.firebasestorage.app",
            messagingSenderId: "620809869635",
            appId: "1:620809869635:web:73098803175365ea8af7f6",
            measurementId: "G-XKMM3285ZY"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    <!-- Preloader -->
    <div id="foundera-preloader">
        <div class="preloader-glow"></div>
        <img src="images/founderaLogo.jpeg" alt="Foundera" class="preloader-logo">
        <div class="preloader-text">Foundera</div>
        <div class="preloader-bar-container"><div class="preloader-bar"></div></div>
    </div>

    <!-- Mobile Menu Button -->
    <button onclick="toggleMobileSidebar()" class="mobile-menu-btn fixed top-4 left-4 z-[60] md:hidden bg-gray-800 p-2 rounded-lg border border-gray-700">
        <i data-lucide="menu" class="w-6 h-6 text-blue-400"></i>
    </button>
    
    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleMobileSidebar()" class="sidebar-overlay fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
    
    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 bg-gray-800/50 backdrop-blur-xl min-h-screen fixed left-0 top-0 border-r border-gray-700/50 z-50 overflow-y-auto transition-transform duration-300">
            <div class="p-6">
                <a href="founder.html" class="flex items-center gap-3 mb-4 cursor-pointer hover:opacity-80 transition-opacity">
                    <img src="images/founderaLogo.jpeg" alt="Foundera" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/30">
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Foundera</span>
                </a>
                <!-- Startup Name Display (visible after posting idea) -->
                <div id="startup-name-display" class="hidden mb-4 px-3 py-2 bg-blue-500/10 border border-blue-500/20 rounded-xl flex items-center"></div>
                
                <!-- Main CTA in Sidebar -->
                <button id="sidebar-share-btn" onclick="setTab('post')" class="w-full mb-6 btn-highlight text-white px-4 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="rocket" class="w-5 h-5 fill-current"></i>
                    <span class="text-[15px] tracking-wide">Share Your Idea</span>
                </button>

                <nav class="space-y-2">
                    <a href="#" onclick="setTab('community')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-community">
                        <i data-lucide="message-circle" class="w-5 h-5 text-indigo-400"></i><span>Community</span>
                    </a>
                    <a href="#" onclick="setTab('overview')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-overview">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Overview</span>
                    </a>
                    <a href="#" onclick="setTab('profile')" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-profile">
                        <i data-lucide="user" class="w-5 h-5"></i><span>My Profile</span>
                    </a>
                    <a href="#" onclick="setTab('ideas')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-ideas">
                        <i data-lucide="lightbulb" class="w-5 h-5"></i><span>My Idea</span>
                    </a>
                    <a href="#" onclick="setTab('roadmap')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-roadmap">
                        <i data-lucide="map" class="w-5 h-5 text-purple-400"></i><span>AI Roadmap</span>
                    </a>
                    <a href="#" onclick="setTab('talent')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-talent">
                        <i data-lucide="users" class="w-5 h-5"></i><span>Find Talent</span>
                    </a>
                    <a href="#" onclick="setTab('investors')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-investors">
                        <i data-lucide="trending-up" class="w-5 h-5"></i><span>Investors</span>
                    </a>
                </nav>
            </div>
            
            <div class="absolute bottom-0 left-0 right-0 p-6 border-t border-gray-700/50">
                <a href="#" onclick="handleLogout()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i><span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content ml-64 flex-1 p-4 md:p-8 pt-16 md:pt-8">
            <!-- Header -->
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold" id="page-title">Overview</h1>
                    <p class="text-gray-400 text-sm md:text-base" id="page-subtitle">Your central hub for action and insights</p>
                </div>
                <div class="flex items-center gap-4">
                    <button id="header-share-btn" onclick="setTab('post')" class="btn-highlight text-white px-3 py-2 md:px-5 md:py-2.5 rounded-xl font-bold flex items-center gap-2 text-xs md:text-sm">
                        <i data-lucide="zap" class="w-4 h-4 fill-current"></i> Share Idea
                    </button>
                    <!-- Notification Bell -->
                    <div id="notif-bell-container" class="relative">
                        <button onclick="toggleNotifPanel()" class="p-3 bg-gray-800/50 rounded-xl hover:bg-gray-700/50 transition-all relative border border-gray-700/50">
                            <i data-lucide="bell" class="w-5 h-5"></i>
                            <span id="notif-count-badge" class="absolute -top-1 -right-1 min-w-[18px] h-[18px] bg-red-500 rounded-full text-[10px] font-bold text-white items-center justify-center px-1" style="display:none">0</span>
                        </button>
                    </div>
                    <div id="header-avatar-container" onclick="setTab('profile')" class="cursor-pointer w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold shadow-lg overflow-hidden">
                        <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-lg font-bold">
                            <span id="user-initial">F</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content" class="animate-fade-in"></div>
        </main>
    </div>
    <script src="js/community.js"></script>
    <script src="js/founder.js"></script>
</body>
</html>
