<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Dashboard - Foundera</title>
    <link rel="icon" type="image/jpeg" href="images/founderaLogo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/jobseeker.css">
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    <!-- Preloader -->
    <div id="foundera-preloader">
        <div class="preloader-glow"></div>
        <img src="images/founderaLogo.jpeg" alt="Foundera" class="preloader-logo">
        <div class="preloader-text">Foundera</div>
        <div class="preloader-bar-container"><div class="preloader-bar"></div></div>
    </div>

    <!-- Mobile Menu Button -->
    <button onclick="toggleMobileSidebar()" class="mobile-menu-btn fixed top-4 left-4 z-[60] md:hidden bg-gray-800 p-2 rounded-lg border border-gray-700">
        <i data-lucide="menu" class="w-6 h-6 text-green-400"></i>
    </button>
    
    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleMobileSidebar()" class="sidebar-overlay fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
    
    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 bg-gray-800/50 backdrop-blur-xl min-h-screen fixed left-0 top-0 border-r border-gray-700/50 z-50 overflow-y-auto transition-transform duration-300">
            <div class="p-6">
                <a href="index.html" class="flex items-center gap-3 mb-8 cursor-pointer hover:opacity-80 transition-opacity">
                    <img src="images/founderaLogo.jpeg" alt="Foundera" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-green-500/30">
                    <span class="text-xl font-bold bg-gradient-to-r from-green-400 to-emerald-400 bg-clip-text text-transparent">Foundera</span>
                </a>
                
                <!-- Main CTA in Sidebar -->
                <button onclick="setTab('jobs')" class="w-full mb-6 btn-highlight-green text-white px-4 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5 fill-current"></i>
                    <span class="text-[15px] tracking-wide">Find Jobs</span>
                </button>

                <nav class="space-y-2">
                    <a href="#" onclick="setTab('overview')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-overview">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Overview</span>
                    </a>
                    <a href="#" onclick="setTab('profile')" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-profile">
                        <i data-lucide="user" class="w-5 h-5"></i><span>My Profile</span>
                    </a>
                    <a href="#" onclick="setTab('jobs')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-jobs">
                        <i data-lucide="search" class="w-5 h-5"></i><span>AI Matches</span>
                    </a>
                    <!-- New Founders Section -->
                    <a href="#" onclick="setTab('founders')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-founders">
                        <i data-lucide="users" class="w-5 h-5 text-blue-400"></i><span>Browse Founders</span>
                    </a>
                    <a href="#" onclick="setTab('applications')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-applications">
                        <i data-lucide="file-text" class="w-5 h-5"></i><span>Applications</span>
                        <span class="ml-auto bg-green-500 text-white text-xs px-2 py-0.5 rounded-full" id="app-count-badge">0</span>
                    </a>
                    <a href="#" onclick="setTab('saved')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300" id="nav-saved">
                        <i data-lucide="bookmark" class="w-5 h-5"></i><span>Saved Jobs</span>
                    </a>
                </nav>
            </div>
            
            <div class="absolute bottom-0 left-0 right-0 p-6 border-t border-gray-700/50 bg-gray-800/90">
                <a href="#" onclick="handleLogout()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i><span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content ml-64 flex-1 p-4 md:p-8 pt-16 md:pt-8">
            <!-- Header -->
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold" id="page-title">My Profile</h1>
                    <p class="text-gray-400 text-sm md:text-base" id="page-subtitle">Manage your personal and contact details.</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="setTab('jobs')" class="btn-highlight-green text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hidden md:flex">
                        <i data-lucide="sparkles" class="w-4 h-4 fill-current"></i> View Matches
                    </button>
                    <div onclick="setTab('profile')" class="cursor-pointer w-12 h-12 bg-gradient-to-br from-green-500 to-emerald-600 rounded-full flex items-center justify-center text-lg font-bold shadow-lg">
                        <span id="user-initial">S</span>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content" class="animate-fade-in pb-20"></div>
        </main>
    </div>
    <script src="js/jobseeker.js"></script>
</body>
</html>
